include:
  - project: 'gnome/citemplates'
    file: 'flatpak/flatpak_ci_initiative.yml'
  - component: 'gitlab.gnome.org/GNOME/citemplates/release-service@master'
    inputs:
      dist-job-name: 'flatpak@x86_64'
      tarball-artifact-path: "${TARBALL_ARTIFACT_PATH}"

variables:
  FLATPAK_MODULE: "shotwell"
  TARBALL_ARTIFACT_PATH: ".flatpak-builder/build/${FLATPAK_MODULE}/_flatpak_build/meson-dist/${CI_PROJECT_NAME}-${CI_COMMIT_TAG}.tar.xz"
  GIT_SUBMODULE_STRATEGY: recursive

.vars-devel:
  variables:
    BUNDLE: "org.gnome.Shotwell.Devel.flatpak"
    MANIFEST_PATH: "flatpak/org.gnome.Shotwell.json"
    RUNTIME_REPO: "https://flathub.org/repo/flathub.flatpakrepo"
    APP_ID: "org.gnome.Shotwell"
    TARBALL_ARTIFACT_PATH: ""

flatpak@x86_64:
    extends: ['.flatpak@x86_64', '.vars-devel']

flatpak@aarch64:
    extends: ['.flatpak@aarch64', '.vars-devel']

nightly@x86_64:
    extends: '.publish_nightly'
    needs: ['flatpak@x86_64']

nightly@aarch64:
    extends: '.publish_nightly'
    needs: ['flatpak@aarch64']

workflow:
  rules:
    # Allow to switch from branch pipelines to MR pipelines seamlessly
    # https://docs.gitlab.com/ee/ci/jobs/job_control.html#avoid-duplicate-pipelines
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS && $CI_PIPELINE_SOURCE == "push"
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    # Don't trigger a branch pipeline if there is an open MR
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    # Don't trigger on wip/* branches (except wip/ci)
    - if: '$CI_COMMIT_BRANCH =~ /^wip\// && $CI_COMMIT_BRANCH !~ /^wip\/ci/'
      when: never
    - if: '$CI_COMMIT_BRANCH'
    - if: '$CI_COMMIT_TAG'


docs:
  image: alpine:latest
  allow_failure: true
  script:
    - apk add yelp-tools yelp-xsl ninja-build meson itstool gettext bash openssh
    - mkdir ~/.ssh
    - echo -n $SSH_HOST_KEY | base64 -d >~/.ssh/known_hosts
    - eval `ssh-agent`
    - echo -n $SSH_PRIVATE_KEY | base64 -d | ssh-add -
    - bash build-aux/render-help.sh
    - scp -r doc-build/html scponly-shotwell-deploy@webstreams.de:doc
  artifacts:
    paths:
      - docs.tar
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - help/**/*
    - if: $CI_COMMIT_TAG
